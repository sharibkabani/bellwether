# Bellwether configuration. Copy to config.yaml and edit.
# Secrets (API keys) do NOT go here — set them in .env (see .env.example).

mode: sim                   # sim (offline simulator) | kraken (real Kraken prices)
data_dir: ./bellwether-data
poll_interval_sec: 300      # seconds between cycles; exits/trailing are checked EVERY cycle (300 = 5 min)
entry_interval_sec: 900     # how often to hunt NEW entries (LLM + journal); keep >= poll_interval (15 min)
daily_report_hour: 17       # local hour (0-23) to send the daily digest

risk:
  starting_bankroll: 5000.0         # paper starting cash (USD)
  max_position_per_trade: 800.0     # max $ in any single coin
  max_total_exposure: 4000.0        # max gross $ deployed
  max_daily_spend: 2000.0           # max $ of new entries per day
  max_open_positions: 6
  position_pct: 0.15                # base fraction of equity per trade (scaled by confidence)
  min_expected_return: 0.03         # require a 3%+ expected move to enter (must clear ~0.5% round-trip fees)
  min_confidence: 0.55              # require 55%+ signal confidence
  stop_loss_pct: 0.07               # cut a loser at -7%
  take_profit_pct: 0.25             # hard ceiling: fully exit a big winner at +25%
  max_drawdown_pct: 0.25            # kill switch: halt if equity falls 25% from peak
  allow_short: false                # Kraken spot is long-only
  # Faster turnover — bank quick gains, let some winners run (long positions):
  partial_take_profit_pct: 0.05     # at +5%, sell part of the position (quick money)
  partial_take_fraction: 0.5        # ...this fraction; the remainder rides
  trailing_stop_pct: 0.04           # then trail the rest: exit if it drops 4% from its peak
  trail_activate_pct: 0.05          # only start trailing once a position has been up 5%

strategy:
  use_momentum: true
  use_trending: true                # the Claude-powered AI signal
  momentum_weight: 1.0
  trending_weight: 2.0              # trust the AI signal more than raw momentum
  categories: []                    # [] = all; or e.g. ["Major", "L1"]
  max_symbols_per_cycle: 25         # cap AI calls per cycle to control cost
  # Kraken trading universe. ``pair`` is Kraken's market code (BTC = XBTUSD,
  # DOGE = XDGUSD; most others are <SYMBOL>USD). Ignored by the sim.
  universe:
    - { symbol: BTC,  pair: XBTUSD,  name: Bitcoin,    category: Major }
    - { symbol: ETH,  pair: ETHUSD,  name: Ethereum,   category: Major }
    - { symbol: SOL,  pair: SOLUSD,  name: Solana,     category: L1 }
    - { symbol: XRP,  pair: XRPUSD,  name: XRP,         category: Payments }
    - { symbol: DOGE, pair: XDGUSD,  name: Dogecoin,   category: Meme }
    - { symbol: ADA,  pair: ADAUSD,  name: Cardano,    category: L1 }
    - { symbol: AVAX, pair: AVAXUSD, name: Avalanche,  category: L1 }
    - { symbol: LINK, pair: LINKUSD, name: Chainlink,  category: DeFi }

llm:
  enabled: true
  provider: groq                    # primary: groq | cerebras | openrouter | gemini | ollama | openai | anthropic
  # Fallback chain ("best free model first"): if Groq hits its daily cap, the
  # bot fails over to the next provider instead of dropping the AI signal.
  # Providers without a key in .env are skipped automatically.
  providers: [groq, cerebras, openrouter]
  model: ""                         # blank = provider default (groq/cerebras -> gpt-oss-120b)
  base_url: ""                      # blank = provider default
  max_tokens: 2000
  cooldown_sec: 300                 # skip a rate-limited provider this long before retrying it
  # Free keys (no credit card): Groq (console.groq.com, fastest, ~1k req/day in
  #   2026) and Cerebras (cloud.cerebras.ai, 1M tokens/day) both serve
  #   gpt-oss-120b. Set GROQ_API_KEY / CEREBRAS_API_KEY in .env.
  # OpenRouter (openrouter.ai) adds free ":free" variants → OPENROUTER_API_KEY.
  # Local, no key, no limits: provider: ollama (needs a box with several GB RAM).
  # If EVERY provider fails, the bot simply falls back to the momentum signal.

learning:
  enabled: true                     # the self-learning loop (prediction journal + daily reflection)
  # --- prediction journal / scoring ---
  prediction_horizon_hours: 24.0    # score a logged prediction against price this far ahead
  min_samples_to_adapt: 20          # require N scored predictions before adapting (slow learning)
  move_threshold: 0.01              # a <1% move counts as "flat" when grading direction
  # --- reliability weights (bounded trust per strategy x coin) ---
  reliability_min: 0.5              # a source can be down-weighted to at most 0.5x
  reliability_max: 1.5              # ...and up-weighted to at most 1.5x
  reliability_prior_strength: 10.0  # regularize hit rate toward 0.5 (resist noise)
  # --- bounded config auto-tuning (SELECTION only; risk limits are immutable) ---
  autotune_enabled: true
  min_confidence_floor: 0.50        # bot may nudge min_confidence only within [floor, ceiling]
  min_confidence_ceiling: 0.70
  min_confidence_step: 0.02
  weight_min: 0.5                   # strategy weights stay within [weight_min, weight_max]
  weight_max: 3.0
  weight_step: 0.25
  # --- universe discovery ---
  discovery_enabled: true
  discovery_min_volume_usd: 5000000 # liquidity floor for a new coin to be considered
  discovery_max_new_per_day: 3
  probation_days: 7.0               # watch a new coin this long before it can graduate
  probation_min_samples: 8
  probation_size_pct: 0.25          # probation coins trade at 25% of normal size
  retire_min_samples: 12
  retire_max_hit_rate: 0.40         # retire a coin whose hit rate stays at/below this
  # --- reflection memory ---
  memory_file: memory/lessons.md    # the bot's trading journal (also stored in the DB)
  reflect_use_llm: true             # have the model write its own lessons each day
  # NOTE: max_position_per_trade, max_daily_spend, max_drawdown_pct, stop_loss_pct
  # and the other capital-protection limits above are HUMAN-OWNED and can never be
  # changed by the bot. It may only adapt selection aggressiveness within the bounds here.

news:
  enabled: true                     # fetch live crypto headlines (free RSS) for the AI signal
  feeds: []                         # [] = built-in feeds (CoinDesk, Cointelegraph, Decrypt)
  max_headlines: 40                 # how many recent headlines to pull per cycle
  per_coin: 3                       # headlines matched to each coin in the prompt
  general: 6                        # top market headlines included for context

kraken:
  api_base: https://api.kraken.com

blog:
  enabled: false                    # publish a daily public blog of findings + learnings
  title: "Bellwether — an autonomous AI crypto trading journal"
  repo_url: ""                      # https://github.com/<you>/<repo>.git (GitHub Pages repo)
  branch: main                      # branch GitHub Pages serves from
  subdir: ""                        # "" = repo root; or "docs" (match your Pages source)
  base_url: ""                      # https://<you>.github.io/<repo>  (for links shown in logs)
  include_dollars: false            # publish % returns + narrative only; never $ balances
  # The push token comes from the env: set GITHUB_TOKEN (fine-grained PAT, Contents: write).

notify:
  channel: console                  # console | email | sms
  email_to: you@example.com
  email_from: you@example.com
  smtp_host: smtp.gmail.com
  smtp_port: 587
  sms_to: ""                        # your phone, e.g. "+15551234567"
  sms_from: ""                      # your Twilio number
